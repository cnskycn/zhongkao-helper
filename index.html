<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>莞深初升高 · 志愿填报助手</title>
<style>
  :root {
    --blue:#2563eb; --blue-light:#eff6ff; --blue-2:#3b82f6;
    --orange:#f59e0b; --green:#10b981; --red:#ef4444;

    --gray:#6b7280; --gray-light:#f3f4f6; --border:#e5e7eb;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:#f8fafc; color:#1f2937; line-height:1.6;
  }
  header {
    background:linear-gradient(135deg,#1e40af,#3b82f6);
    color:#fff; padding:24px 16px; text-align:center;
    position:sticky; top:0; z-index:100;
    box-shadow:0 2px 12px rgba(0,0,0,.15);
  }
  header h1 { font-size:20px; font-weight:700; }
  header p { font-size:12px; opacity:.85; margin-top:2px; }
  .container { max-width:960px; margin:0 auto; padding:12px 16px 80px; }
  .nav-tabs {
    display:flex; gap:0; margin-bottom:12px;
    background:#fff; border-radius:12px; overflow:hidden;
    box-shadow:0 1px 3px rgba(0,0,0,.08);
  }
  .nav-tab {
    flex:1; padding:10px 4px; text-align:center;
    font-size:13px; font-weight:600; cursor:pointer;
    border:none; background:#fff; color:var(--gray);
    transition:all .2s; position:relative;
  }
  .nav-tab.active { color:var(--blue); background:var(--blue-light); }
  .nav-tab.active::after {
    content:''; position:absolute; bottom:0; left:15%; right:15%;
    height:3px; background:var(--blue); border-radius:3px 3px 0 0;
  }
  .sub-tabs {
    display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap;
  }
  .sub-tab {
    padding:6px 14px; border-radius:20px; font-size:12px;
    font-weight:500; cursor:pointer; border:1px solid var(--border);
    background:#fff; color:var(--gray); transition:all .2s;
  }
  .sub-tab.active { background:var(--blue); color:#fff; border-color:var(--blue); }
  .controls {
    display:flex; gap:8px; margin-bottom:10px; flex-wrap:wrap;
  }
  .controls input, .controls select {
    flex:1; min-width:120px; padding:7px 10px;
    border:1px solid var(--border); border-radius:8px;
    font-size:12px; background:#fff;
  }
  .controls input:focus, .controls select:focus {
    outline:none; border-color:var(--blue);
    box-shadow:0 0 0 3px rgba(37,99,235,.1);
  }
  .stats-bar { display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
  .stat-card {
    background:#fff; border-radius:8px; padding:8px 12px;
    flex:1; min-width:80px; text-align:center;
    box-shadow:0 1px 3px rgba(0,0,0,.06);
  }
  .stat-card .num { font-size:18px; font-weight:700; color:var(--blue); }
  .stat-card .label { font-size:10px; color:var(--gray); }
  .school-grid { display:flex; flex-direction:column; gap:6px; }
  .school-card {
    background:#fff; border-radius:10px; padding:10px 12px;
    box-shadow:0 1px 3px rgba(0,0,0,.06);
    transition:transform .15s; cursor:pointer;
  }
  .school-card:hover { transform:translateY(-1px); box-shadow:0 2px 8px rgba(0,0,0,.1); }
  .school-card .name { font-size:13px; font-weight:600; margin-bottom:4px; }
  .tag {
    display:inline-block; font-size:9px; padding:1px 5px;
    border-radius:4px; margin-left:3px; vertical-align:middle;
  }
  .tag-public { background:#dbeafe; color:#1d4ed8; }
  .tag-private { background:#fce7f3; color:#be185d; }
  .tag-gongfei { background:#fef3c7; color:#b45309; }
  .tag-zifei { background:#f3e8ff; color:#7c3aed; }
  .tag-gaokao { background:#d1fae5; color:#065f46; }
  .tag-hot { background:#fee2e2; color:#991b1b; }
  .scores { display:flex; gap:6px; flex-wrap:wrap; font-size:11px; }
  .score-item { background:var(--gray-light); padding:2px 6px; border-radius:4px; white-space:nowrap; }
  .score-item .val { font-weight:600; }
  .trend-up { color:var(--red); } .trend-down { color:var(--green); } .trend-flat { color:var(--gray); }
  .policy-section { margin-bottom:16px; }
  .policy-section h3 {
    font-size:15px; font-weight:700; margin-bottom:8px;
    padding-left:10px; border-left:3px solid var(--blue);
  }
  .policy-card {
    background:#fff; border-radius:10px; padding:14px;
    margin-bottom:8px; box-shadow:0 1px 3px rgba(0,0,0,.06);
  }
  .policy-card h4 { font-size:13px; font-weight:600; margin-bottom:6px; }
  .policy-card p, .policy-card li { font-size:12px; color:#374151; line-height:1.7; }
  .policy-card ul { padding-left:16px; }
  .policy-card table { width:100%; border-collapse:collapse; font-size:11px; margin:4px 0; }
  .policy-card td, .policy-card th { padding:5px 6px; border:1px solid var(--border); text-align:left; }
  .policy-card th { background:var(--gray-light); font-weight:600; }
  .policy-badge {
    display:inline-block; font-size:10px; padding:2px 8px;
    border-radius:10px; font-weight:600; margin-right:4px;
  }
  .badge-new { background:#dbeafe; color:#1d4ed8; }
  .badge-imp { background:#fee2e2; color:#991b1b; }
  .badge-info { background:#d1fae5; color:#065f46; }
  .policy-toc { display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
  .policy-toc a {
    display:block; padding:5px 10px; border-radius:6px;
    background:#fff; border:1px solid var(--border);
    font-size:11px; color:var(--blue); text-decoration:none; font-weight:500;
  }
  .detail-panel {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,.45); z-index:200;
    display:none; justify-content:center; align-items:center; padding:16px;
  }
  .detail-panel.show { display:flex; }
  .detail-content {
    background:#fff; border-radius:16px;
    max-width:520px; width:100%; max-height:80vh;
    overflow-y:auto; padding:20px; position:relative;
  }
  .detail-close {
    position:absolute; top:10px; right:14px;
    font-size:22px; cursor:pointer; color:var(--gray);
    border:none; background:none; line-height:1;
  }
  .detail-content h2 { font-size:18px; margin-bottom:12px; }
  .detail-table { width:100%; border-collapse:collapse; font-size:12px; }
  .detail-table th { background:var(--gray-light); padding:6px 8px; text-align:left; font-weight:600; border-bottom:2px solid var(--border); }
  .detail-table td { padding:6px 8px; border-bottom:1px solid var(--border); }
  .no-result { text-align:center; padding:40px 16px; color:var(--gray); }
  .back-top {
    position:fixed; bottom:24px; right:24px;
    width:44px; height:44px; border-radius:50%;
    background:var(--blue); color:#fff; border:none;
    font-size:20px; cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,.2); display:none; z-index:50;
  }
  .footer { text-align:center; padding:20px 16px; font-size:11px; color:var(--gray); }
  @media (max-width:480px) {
    header h1 { font-size:17px; }
    .nav-tab { font-size:11px; padding:8px 2px; }
    .controls { flex-direction:column; }
    .controls input, .controls select { min-width:unset; }
    .stat-card { min-width:calc(50% - 3px); }
  }
</style>
</head>

  <div class="school-grid" id="gkGrid"></div>
  <div class="no-result" id="gkNoResult" style="display:none;">😕 没有找到</div>

<div id="viewPolicy" style="display:none;">

</div>
</div>

let curView='scores', curCity='sz', curGk='sz', curPcy='sz';
function rSZ(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const s=document.getElementById('sortSelect').value;
  let l=SZ.filter(r=>!q||r[0].toLowerCase().includes(q));
  if(s==='score-desc')l.sort((a,b)=>(b[3]||0)-(a[3]||0));
  else if(s==='score-asc')l.sort((a,b)=>(a[3]||999)-(b[3]||999));
  else l.sort((a,b)=>a[0].localeCompare(b[0],'zh'));
  document.getElementById('statsBar').innerHTML=
    `<div class="stat-card"><div class="num">${SZ.length}</div><div class="label">深圳高中</div></div>
     <div class="stat-card"><div class="num">${l.length}</div><div class="label">筛选结果</div></div>
     <div class="stat-card"><div class="num">${SZ.filter(r=>r[3]&&r[3]>=560).length}</div><div class="label">≥560分</div></div>`;
  const g=document.getElementById('schoolGrid');
  if(!l.length){g.innerHTML='';document.getElementById('noResult').style.display='block';return;}
  document.getElementById('noResult').style.display='none';
  g.innerHTML=l.map(r=>{
    const t=r[4]!==null&&r[4]!==undefined?(r[4]>0?'<span class="trend-up">↑'+r[4]+'</span>':r[4]<0?'<span class="trend-down">↓'+Math.abs(r[4])+'</span>':'<span class="trend-flat">→</span>'):'<span class="trend-flat">—</span>';
    return `<div class="school-card" onclick="showD('sz','${r[0]}')"><div class="name">${r[0]}</div>
      <div class="scores">
        <span class="score-item">2023: <span class="val">${r[1]||'—'}</span></span>
        <span class="score-item">2024: <span class="val">${r[2]||'—'}</span></span>
        <span class="score-item">2025: <span class="val" style="color:var(--blue)">${r[3]||'—'}</span></span>
        <span class="score-item">趋势: ${t}</span></div></div>`;
  }).join('');
}
function rDG(){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const s=document.getElementById('sortSelect').value;
  const cat=document.getElementById('dgFilter').value;
  let l=DG.filter(r=>!q||r[1].toLowerCase().includes(q));
  if(cat!=='all')l=l.filter(r=>r[2]===cat);
  if(s==='score-desc')l.sort((a,b)=>(b[5]||0)-(a[5]||0));
  else if(s==='score-asc')l.sort((a,b)=>(a[5]||999)-(b[5]||999));
  else l.sort((a,b)=>a[1].localeCompare(b[1],'zh'));
  const uniqueNames=new Set(DG.map(r=>r[1]));
  document.getElementById('statsBar').innerHTML=
    `<div class="stat-card"><div class="num">${uniqueNames.size}</div><div class="label">东莞学校</div></div>
     <div class="stat-card"><div class="num">${l.length}</div><div class="label">当前条目</div></div>
     <div class="stat-card"><div class="num">${l.filter(r=>r[5]>=700).length}</div><div class="label">≥700分录</div></div>`;
  const g=document.getElementById('schoolGrid');
  if(!l.length){g.innerHTML='';document.getElementById('noResult').style.display='block';return;}
  document.getElementById('noResult').style.display='none';
  g.innerHTML=l.map(r=>{
    const tag=r[0]==='公办'?'<span class="tag tag-public">公办</span>':'<span class="tag tag-private">民办</span>';

    const t=r[6]!==null&&r[6]!==undefined?(r[6]>0?'<span class="trend-up">↑'+r[6]+'</span>':r[6]<0?'<span class="trend-down">↓'+Math.abs(r[6])+'</span>':'<span class="trend-flat">→</span>'):'';
    return `<div class="school-card" onclick="showD('dg','${r[1]}')"><div class="name">${r[1]} ${tag} ${catTag}</div>
      <div class="scores">

  }).join('');
